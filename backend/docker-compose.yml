services:
  postgres:
    image: postgres:17
    container_name: fintech-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintech_db

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: